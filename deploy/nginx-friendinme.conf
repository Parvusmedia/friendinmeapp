# FriendInMe — sitio completo HTTP→HTTPS + SSL (Let’s Encrypt ya emitido).
# 1) FriendInMe Next escucha en 127.0.0.1:3010 (ver friendinme-web.service).
# 2) Copiar a /etc/nginx/sites-available/friendinme y activar:
#    sudo cp /opt/apps/friendinme/deploy/nginx-friendinme.conf /etc/nginx/sites-available/friendinme
#    sudo ln -sf /etc/nginx/sites-available/friendinme /etc/nginx/sites-enabled/friendinme
# 3) sudo nginx -t && sudo systemctl reload nginx
# 4) Si el certificado ya existe: sudo certbot install --cert-name friendinme.pmediaplus.com
#    (o deja las rutas ssl_* de abajo; certbot las creó en /etc/letsencrypt/live/...)

upstream friendinme_api {
    server 127.0.0.1:8000;
}

upstream friendinme_web {
    server 127.0.0.1:3010;
}

# Redirección a HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name friendinme.pmediaplus.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name friendinme.pmediaplus.com;

    ssl_certificate     /etc/letsencrypt/live/friendinme.pmediaplus.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/friendinme.pmediaplus.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    # Descomenta solo si existe: ls /etc/letsencrypt/ssl-dhparams.pem
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 8M;

    # Fuerza HTTPS en visitas normales (evita quedarse en http por caché/favoritos)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ^~ evita que otras location regex se coman el prefijo.
    # proxy_pass sin URI: reenvía la misma ruta (/api/..., /media/...) al backend FastAPI.
    location ^~ /api/ {
        proxy_pass http://friendinme_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /media/ {
        proxy_pass http://friendinme_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://friendinme_web/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
